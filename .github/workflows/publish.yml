name: Publish

on:
  push:
    tags: ["v*"]
  # Fallback for environments that can't push tags (e.g. remote sandboxes):
  # run on main after the version-bump commit lands, and this workflow derives
  # the tag from package.json and creates it along with the release.
  workflow_dispatch:

permissions:
  contents: write # create the GitHub release
  id-token: write # npm trusted publishing (OIDC)

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Node
        uses: actions/setup-node@v5
        with:
          node-version: 24

      # Trusted publishing needs npm >= 11.5.1
      - name: Update npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Resolve tag
        run: |
          version="$(node -p "require('./package.json').version")"
          if [ "$GITHUB_EVENT_NAME" = "push" ]; then
            if [ "v$version" != "$GITHUB_REF_NAME" ]; then
              echo "✗ tag $GITHUB_REF_NAME does not match package.json version $version" >&2
              exit 1
            fi
            echo "TAG=$GITHUB_REF_NAME" >> "$GITHUB_ENV"
          else
            echo "TAG=v$version" >> "$GITHUB_ENV"
          fi

      - name: Setup env vars for type checking
        run: |
          echo "ZEPTO_TOKEN=test-token" > .env
          echo "EMAIL_FROM_ADDRESS=test@example.com" >> .env
          echo "EMAIL_TO_ADDRESS=test@example.com" >> .env

      - name: Run tests
        run: bun run test

      - name: Build
        run: bun run build

      # No token — auth is OIDC via the trusted publisher configured on npmjs.com,
      # which also attaches provenance to the package.
      - name: Publish to npm
        run: npm publish

      # On dispatch runs the tag doesn't exist yet — gh creates it at this commit.
      # (Tags created with the workflow's own token don't re-trigger this workflow.)
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          args=(--title "${TAG#v}" --generate-notes)
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            args+=(--target "$GITHUB_SHA")
          fi
          gh release create "$TAG" "${args[@]}"
